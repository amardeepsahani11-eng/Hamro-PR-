<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Simple Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      text-align: center;
    }
    header {
      background-color: #333;
      color: white;
      padding: 15px;
    }
    section {
      margin: 20px;
      padding: 20px;
      background: white;
      border-radius: 10px;
    }
    button {
      padding: 10px 15px;
      border: none;
      background-color: #007BFF;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

<header>
  <h1>Welcome to My Website</h1>
</header>

<section>
  <p>This is a simple website created using HTML, CSS, and JavaScript.</p>
  <button onclick="showMessage()">Click Me</button>
  <p id="message"></p>
</section>

<script>
  function showMessage() {
    document.getElementById("message").innerText = "Hello! You clicked the button 🎉";
  }
</script>

</body>
</html>
